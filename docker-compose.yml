services:
  postgres:
    image: postgres:16-alpine
    container_name: guozi-warehouse-postgres
    environment:
      POSTGRES_USER: guozi
      POSTGRES_PASSWORD: guozi
      POSTGRES_DB: guozi_warehouse
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guozi -d guozi_warehouse"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
